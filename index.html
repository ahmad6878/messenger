<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мессенджер</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, sans-serif; background: #f0f0f0; height: 100vh; display: flex; flex-direction: column; }
    #login { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 12px; }
    #login input { padding: 12px 16px; border-radius: 12px; border: 1px solid #ddd; font-size: 16px; width: 260px; }
    #login button { padding: 12px 32px; background: #007AFF; color: white; border: none; border-radius: 12px; font-size: 16px; cursor: pointer; width: 260px; }
    #chat { display: none; flex-direction: column; height: 100vh; }
    #header { background: #007AFF; color: white; padding: 16px; text-align: center; font-size: 18px; font-weight: 600; }
    #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
    .msg { max-width: 70%; padding: 10px 14px; border-radius: 18px; font-size: 15px; line-height: 1.4; }
    .msg.mine { background: #007AFF; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
    .msg.other { background: white; color: black; align-self: flex-start; border-bottom-left-radius: 4px; }
    .msg.system { background: none; color: #999; align-self: center; font-size: 13px; }
    .msg-name { font-size: 12px; opacity: 0.7; margin-bottom: 3px; }
    #input-area { display: flex; padding: 12px; gap: 8px; background: white; border-top: 1px solid #eee; }
    #input-area input { flex: 1; padding: 10px 14px; border-radius: 20px; border: 1px solid #ddd; font-size: 15px; outline: none; }
    #input-area button { padding: 10px 18px; background: #007AFF; color: white; border: none; border-radius: 20px; font-size: 15px; cursor: pointer; }
  </style>
</head>
<body>
  <div id="login">
    <h2>Мессенджер</h2>
    <input id="username" placeholder="Твоё имя" maxlength="20">
    <button onclick="join()">Войти</button>
  </div>
  <div id="chat">
    <div id="header">💬 Общий чат</div>
    <div id="messages"></div>
    <div id="input-area">
      <input id="text" placeholder="Сообщение..." onkeydown="if(event.key==='Enter') send()">
      <button onclick="send()">→</button>
    </div>
  </div>
  <script>
    let ws, myName;
    function join() {
      myName = document.getElementById('username').value.trim();
      if (!myName) return;
      
      const protocol = location.protocol === 'https:' ? 'wss://' : 'ws://';
      ws = new WebSocket(`${protocol}${location.host}`);
      
      ws.onopen = () => {
        ws.send(JSON.stringify({ type: 'join', username: myName }));
        document.getElementById('login').style.display = 'none';
        document.getElementById('chat').style.display = 'flex';
      };
      ws.onmessage = (e) => {
        const data = JSON.parse(e.data);
        const msgs = document.getElementById('messages');
        const div = document.createElement('div');
        if (data.type === 'system') {
          div.className = 'msg system';
          div.textContent = data.text;
        } else {
          div.className = `msg ${data.username === myName ? 'mine' : 'other'}`;
          if (data.username !== myName) {
            const name = document.createElement('div');
            name.className = 'msg-name';
            name.textContent = data.username;
            div.appendChild(name);
          }
          const text = document.createElement('div');
          text.textContent = data.text;
          div.appendChild(text);
        }
        msgs.appendChild(div);
        msgs.scrollTop = msgs.scrollHeight;
      };
    }
    function send() {
      const input = document.getElementById('text');
      const text = input.value.trim();
      if (!text || !ws) return;
      ws.send(JSON.stringify({ type: 'message', text }));
      input.value = '';
    }
  </script>
</body>
</html>
