<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мессенджер</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, sans-serif;
      background: #f0f0f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #login {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 10px;
    }

    #login input {
      padding: 12px;
      width: 250px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    #login button {
      padding: 10px;
      width: 250px;
      border: none;
      border-radius: 10px;
      background: #007AFF;
      color: white;
      cursor: pointer;
    }

    #chat {
      display: none;
      flex-direction: column;
      height: 100vh;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }

    .msg {
      margin: 5px 0;
    }

    #input-area {
      display: flex;
      padding: 10px;
      gap: 5px;
      background: white;
    }

    #input-area input {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: 1px solid #ccc;
    }

    #input-area button {
      padding: 10px 15px;
      border: none;
      border-radius: 20px;
      background: #007AFF;
      color: white;
    }
  </style>
</head>

<body>

  <!-- ЛОГИН -->
  <div id="login">
    <h2>Мессенджер</h2>
    <input id="username" placeholder="Имя">
    <input id="password" type="password" placeholder="Пароль">
    <button onclick="register()">Регистрация</button>
    <button onclick="login()">Войти</button>
  </div>

  <!-- ЧАТ -->
  <div id="chat">
    <div id="messages"></div>

    <div id="input-area">
      <input id="text" placeholder="Сообщение..." onkeydown="if(event.key==='Enter') send()">
      <button onclick="send()">→</button>
    </div>
  </div>

  <script>
    let ws;
    let token;
    let myName;

    async function register() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      const res = await fetch('/register', {
        method: 'POST',
        body: JSON.stringify({ username, password })
      });

      const data = await res.json();
      alert(data.success ? 'Аккаунт создан' : 'Ошибка');
    }

    async function login() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      const res = await fetch('/login', {
        method: 'POST',
        body: JSON.stringify({ username, password })
      });

      const data = await res.json();

      if (data.success) {
        token = data.token;
        myName = username;

        document.getElementById('login').style.display = 'none';
        document.getElementById('chat').style.display = 'flex';

        connect();
      } else {
        alert('Ошибка входа');
      }
    }

    function connect() {
      const protocol = location.protocol === 'https:' ? 'wss://' : 'ws://';
      ws = new WebSocket(protocol + location.host);

      ws.onmessage = (e) => {
        const data = JSON.parse(e.data);

        const div = document.createElement('div');
        div.className = 'msg';

        div.textContent = (data.username || 'Система') + ': ' + data.text;

        document.getElementById('messages').appendChild(div);
      };
    }

    function send() {
      const input = document.getElementById('text');
      const text = input.value;

      if (!text || !ws) return;

      ws.send(JSON.stringify({
        username: myName,
        text
      }));

      input.value = '';
    }
  </script>

</body>
</html>
