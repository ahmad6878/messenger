<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Messenger</title>
    <style>
        :root { --primary: #007AFF; --bg: #ffffff; --gray: #f2f2f7; }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); height: 100vh; overflow: hidden; }
        #auth-screen { position: fixed; inset: 0; background: white; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; gap: 10px; }
        #auth-screen h2 { margin-bottom: 10px; font-size: 28px; }
        #auth-screen input { width: 100%; max-width: 300px; padding: 13px 16px; border-radius: 12px; border: 1px solid #ddd; outline: none; font-size: 16px; }
        #auth-screen button { width: 100%; max-width: 300px; padding: 13px; border-radius: 12px; border: none; background: var(--primary); color: white; cursor: pointer; font-weight: 600; font-size: 16px; }
        #auth-screen .link-btn { background: none; color: var(--primary); font-weight: 400; }
        #auth-error { color: #ff3b30; font-size: 14px; min-height: 18px; }
        #main-app { display: none; height: 100vh; width: 100%; }
        #sidebar { width: 30%; min-width: 240px; border-right: 1px solid #e5e5ea; display: flex; flex-direction: column; background: white; }
        #sidebar-header { padding: 16px; border-bottom: 1px solid #e5e5ea; display: flex; justify-content: space-between; align-items: center; }
        #search-wrap { padding: 8px 12px; border-bottom: 1px solid #e5e5ea; }
        #search { width: 100%; padding: 8px 12px; border-radius: 10px; border: none; background: #f2f2f7; outline: none; font-size: 15px; }
        #chat-list { flex: 1; overflow-y: auto; }
        .chat-item { padding: 12px 16px; border-bottom: 1px solid #f2f2f7; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: background 0.15s; }
        .chat-item:hover { background: #f9f9f9; }
        .avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; flex-shrink: 0; }
        #chat-area { flex: 1; display: flex; flex-direction: column; background: white; }
        #chat-header { padding: 10px 16px; border-bottom: 1px solid #e5e5ea; display: flex; align-items: center; gap: 12px; min-height: 60px; }
        #back-btn { display: none; font-size: 26px; cursor: pointer; color: var(--primary); }
        #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
        #no-chat { display: flex; align-items: center; justify-content: center; flex: 1; color: #999; font-size: 16px; }
        .msg { max-width: 72%; padding: 9px 13px; border-radius: 18px; font-size: 15px; line-height: 1.4; word-wrap: break-word; }
        .msg.me { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 5px; }
        .msg.op { align-self: flex-start; background: #e9e9eb; color: black; border-bottom-left-radius: 5px; }
        .msg img { max-width: 100%; border-radius: 10px; display: block; margin-top: 4px; }
        .msg audio { max-width: 220px; height: 36px; display: block; margin-top: 4px; }
        .msg-time { font-size: 11px; opacity: 0.55; margin-top: 3px; text-align: right; }
        #input-panel { padding: 10px 12px; display: flex; align-items: center; gap: 8px; border-top: 1px solid #e5e5ea; background: white; }
        #msg-input { flex: 1; background: #f2f2f7; border: none; padding: 10px 14px; border-radius: 20px; outline: none; font-size: 15px; resize: none; }
        .icon-btn { font-size: 24px; cursor: pointer; padding: 4px; user-select: none; flex-shrink: 0; }
        #record-btn.recording { color: red; animation: pulse 1s infinite; }
        #send-btn { background: var(--primary); color: white; border: none; border-radius: 50%; width: 36px; height: 36px; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        #settings-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 3000; justify-content: center; align-items: center; }
        .settings-content { background: white; padding: 30px 24px; border-radius: 18px; width: 300px; text-align: center; }
        .btn-danger { background: #ff3b30; width: 100%; margin-top: 14px; padding: 13px; border-radius: 12px; border: none; color: white; font-size: 16px; font-weight: 600; cursor: pointer; }
        .btn-close { margin-top: 12px; color: var(--primary); cursor: pointer; font-size: 15px; }
        #call-screen { position: fixed; inset: 0; background: #1c1c1e; z-index: 4000; display: none; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .call-avatar { width: 110px; height: 110px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 48px; font-weight: bold; margin-bottom: 24px; }
        #call-status { font-size: 16px; color: #aaaab0; margin-bottom: 6px; }
        #call-name { font-size: 26px; font-weight: 600; }
        .call-controls { position: absolute; bottom: 60px; display: flex; gap: 40px; }
        .call-btn { width: 68px; height: 68px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 26px; cursor: pointer; }
        .hangup { background: #ff3b30; }
        .answer { background: #34c759; }
        #conn-status { position: fixed; top: 8px; left: 50%; transform: translateX(-50%); background: #ff3b30; color: white; padding: 3px 14px; border-radius: 20px; font-size: 12px; display: none; z-index: 9999; }
        @media (max-width: 768px) {
            #sidebar { width: 100%; }
            #chat-area { position: fixed; inset: 0; width: 100%; z-index: 10; display: none; flex-direction: column; }
            #chat-area.active { display: flex; }
            #back-btn { display: block; }
        }
        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
    </style>
</head>
<body>
<div id="conn-status">Нет соединения. Переподключение...</div>
<div id="auth-screen">
    <h2>Messenger</h2>
    <input type="text" id="username" placeholder="Логин" autocomplete="username">
    <input type="password" id="password" placeholder="Пароль" autocomplete="current-password" onkeypress="if(event.key==='Enter') auth('login')">
    <div id="auth-error"></div>
    <button onclick="auth('login')">Войти</button>
    <button class="link-btn" onclick="auth('register')">Создать аккаунт</button>
</div>
<div id="main-app">
    <div id="sidebar">
        <div id="sidebar-header">
            <span id="my-name" style="font-weight:600; font-size:18px;"></span>
            <span class="icon-btn" onclick="openSettings()">⚙️</span>
        </div>
        <div id="search-wrap">
            <input type="text" id="search" placeholder="🔍 Поиск..." oninput="searchUsers()">
        </div>
        <div id="chat-list"></div>
    </div>
    <div id="chat-area">
        <div id="chat-header">
            <span id="back-btn" onclick="closeChat()">‹</span>
            <div class="avatar" id="chat-avatar" style="width:36px;height:36px;font-size:16px;">?</div>
            <div style="flex:1"><b id="chat-user-name">Выберите чат</b></div>
            <button onclick="startCall()" style="background:none;border:none;font-size:22px;cursor:pointer;">📞</button>
        </div>
        <div id="messages"></div>
        <div id="no-chat">Выберите чат слева</div>
        <div id="input-panel" style="display:none;">
            <label class="icon-btn">📷<input type="file" hidden id="file-input" accept="image/*" onchange="sendFile(this)"></label>
            <textarea id="msg-input" placeholder="Сообщение..." rows="1" onkeypress="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendText();}"></textarea>
            <span id="record-btn" class="icon-btn" onclick="toggleRecord()">🎤</span>
            <button id="send-btn" onclick="sendText()">↑</button>
        </div>
    </div>
</div>
<div id="settings-modal">
    <div class="settings-content">
        <div class="avatar" id="settings-avatar" style="width:70px;height:70px;font-size:30px;margin:0 auto 12px;">U</div>
        <h2 id="settings-name" style="margin-bottom:20px;"></h2>
        <button class="btn-danger" onclick="logout()">Выйти из аккаунта</button>
        <div class="btn-close" onclick="closeSettings()">Закрыть</div>
    </div>
</div>
<div id="call-screen">
    <audio id="remote-audio" autoplay playsinline></audio>
    <div class="call-avatar" id="call-avatar-display">U</div>
    <div id="call-status">Звонок...</div>
    <div id="call-name">Собеседник</div>
    <div class="call-controls">
        <div id="answer-btn" class="call-btn answer" onclick="acceptCall()" style="display:none;">📞</div>
        <div class="call-btn hangup" onclick="endCall(true)">🛑</div>
    </div>
</div>
<script>
let currentUser=null,token=null,ws=null,activeId=null,activeName=null;
let mediaRecorder=null,audioChunks=[],peerConn=null,localStream=null;
let reconnectTimer=null,pendingOffer=null,callTargetId=null;

const rtcConfig={iceServers:[
    {urls:'stun:stun.l.google.com:19302'},
    {urls:'stun:stun1.l.google.com:19302'},
    {urls:'turn:openrelay.metered.ca:80',username:'openrelayproject',credential:'openrelayproject'},
    {urls:'turn:openrelay.metered.ca:443',username:'openrelayproject',credential:'openrelayproject'}
]};

async function auth(type){
    const u=document.getElementById('username').value.trim();
    const p=document.getElementById('password').value;
    const err=document.getElementById('auth-error');
    err.innerText='';
    if(!u||!p){err.innerText='Заполните все поля';return;}
    try{
        const res=await fetch('/api/'+type,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
        const d=await res.json();
        if(d.token){
            token=d.token;currentUser=d.user;
            localStorage.setItem('m_token',token);
            localStorage.setItem('m_user',JSON.stringify(currentUser));
            startApp();
        } else if(type==='register'&&d.success){
            err.style.color='#34c759';err.innerText='Аккаунт создан! Войдите.';
        } else {
            err.innerText=d.error||'Ошибка';
        }
    }catch(e){err.innerText='Нет связи с сервером';}
}

function startApp(){
    document.getElementById('auth-screen').style.display='none';
    document.getElementById('main-app').style.display='flex';
    document.getElementById('my-name').innerText=currentUser.username;
    document.getElementById('settings-name').innerText=currentUser.username;
    document.getElementById('settings-avatar').innerText=currentUser.username[0].toUpperCase();
    connectWS();loadChats();
}

function openSettings(){document.getElementById('settings-modal').style.display='flex';}
function closeSettings(){document.getElementById('settings-modal').style.display='none';}
function logout(){localStorage.clear();location.reload();}

function connectWS(){
    if(ws&&(ws.readyState===WebSocket.CONNECTING||ws.readyState===WebSocket.OPEN))return;
    const proto=location.protocol==='https:'?'wss://':'ws://';
    ws=new WebSocket(proto+location.host);
    ws.onopen=()=>{
        clearTimeout(reconnectTimer);
        document.getElementById('conn-status').style.display='none';
        ws.send(JSON.stringify({type:'auth',token}));
    };
    ws.onmessage=async(e)=>{
        const d=JSON.parse(e.data);
        if(d.type==='private_message'){
            const otherId=d.sender_id==currentUser.id?Number(d.receiver_id):Number(d.sender_id);
            if(activeId&&otherId==activeId)addMsg(d);
            loadChats();
        }
        if(d.type==='call_offer')handleOffer(d);
        if(d.type==='call_answer'&&peerConn){
            await peerConn.setRemoteDescription(new RTCSessionDescription(d.sdp));
            document.getElementById('call-status').innerText='Разговор';
        }
        if(d.type==='ice_candidate'&&peerConn){
            try{await peerConn.addIceCandidate(new RTCIceCandidate(d.candidate));}catch(e){}
        }
        if(d.type==='call_hangup')endCall(false);
    };
    ws.onclose=()=>{
        document.getElementById('conn-status').style.display='block';
        reconnectTimer=setTimeout(connectWS,2500);
    };
    ws.onerror=()=>ws.close();
}

function sendWS(obj){
    if(!ws||ws.readyState!==WebSocket.OPEN){connectWS();return false;}
    ws.send(JSON.stringify(obj));return true;
}

async function loadChats(){
    try{
        const res=await fetch('/api/chats',{headers:{'Authorization':'Bearer '+token}});
        const chats=await res.json();
        const list=document.getElementById('chat-list');
        list.innerHTML='';
        chats.forEach(c=>{
            if(!c)return;
            const div=document.createElement('div');
            div.className='chat-item';div.dataset.id=c.id;
            div.innerHTML=`<div class="avatar">${c.username[0].toUpperCase()}</div><div style="font-size:15px;"><b>${c.username}</b></div>`;
            div.onclick=()=>openChat(c.id,c.username);
            if(activeId==c.id)div.style.background='#f0f7ff';
            list.appendChild(div);
        });
    }catch(e){}
}

async function searchUsers(){
    const q=document.getElementById('search').value.trim();
    if(q.length<2){loadChats();return;}
    try{
        const res=await fetch('/api/search?q='+encodeURIComponent(q),{headers:{'Authorization':'Bearer '+token}});
        const users=await res.json();
        const list=document.getElementById('chat-list');
        list.innerHTML='';
        if(users.length===0){list.innerHTML='<div style="padding:20px;text-align:center;color:#999;">Не найдено</div>';return;}
        users.forEach(u=>{
            const div=document.createElement('div');div.className='chat-item';
            div.innerHTML=`<div class="avatar">${u.username[0].toUpperCase()}</div><div><b>${u.username}</b></div>`;
            div.onclick=()=>{document.getElementById('search').value='';openChat(u.id,u.username);};
            list.appendChild(div);
        });
    }catch(e){}
}

async function openChat(id,name){
    activeId=id;activeName=name;
    document.getElementById('chat-user-name').innerText=name;
    document.getElementById('chat-avatar').innerText=name[0].toUpperCase();
    document.getElementById('chat-area').classList.add('active');
    document.getElementById('no-chat').style.display='none';
    document.getElementById('messages').style.display='flex';
    document.getElementById('input-panel').style.display='flex';
    try{
        const res=await fetch('/api/messages/'+id,{headers:{'Authorization':'Bearer '+token}});
        const msgs=await res.json();
        const container=document.getElementById('messages');
        container.innerHTML='';
        msgs.forEach(addMsg);scrollToBottom();
    }catch(e){}
    document.querySelectorAll('.chat-item').forEach(el=>{el.style.background=el.dataset.id==id?'#f0f7ff':'';});
}

function closeChat(){
    document.getElementById('chat-area').classList.remove('active');
    activeId=null;activeName=null;
}

function addMsg(m){
    const container=document.getElementById('messages');
    const div=document.createElement('div');
    div.className='msg '+(m.sender_id==currentUser.id?'me':'op');
    const type=m.msgType||m.type||'text';
    let content='';
    if(type==='image'&&m.file_url)content=`<img src="${m.file_url}" onload="scrollToBottom()" loading="lazy">`;
    else if(type==='audio'&&m.file_url)content=`<audio controls src="${m.file_url}"></audio>`;
    else content=`<span>${escapeHtml(m.text||'')}</span>`;
    const time=m.timestamp?new Date(m.timestamp).toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'}):'';
    div.innerHTML=content+`<div class="msg-time">${time}</div>`;
    container.appendChild(div);scrollToBottom();
}

function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function scrollToBottom(){const c=document.getElementById('messages');setTimeout(()=>{c.scrollTop=c.scrollHeight;},50);}

function sendText(){
    const i=document.getElementById('msg-input');
    const text=i.value.trim();
    if(!text||!activeId)return;
    if(!sendWS({type:'private_message',receiverId:activeId,text}))return;
    i.value='';
}

async function sendFile(input){
    if(!activeId)return;
    const file=input.files[0];if(!file)return;
    input.disabled=true;
    try{
        const fd=new FormData();fd.append('file',file);
        const res=await fetch('/api/upload',{method:'POST',headers:{'Authorization':'Bearer '+token},body:fd});
        const d=await res.json();
        sendWS({type:'private_message',receiverId:activeId,msgType:'image',fileUrl:d.file_url});
    }catch(e){alert('Ошибка загрузки файла');}
    input.value='';input.disabled=false;
}

async function toggleRecord(){
    if(!activeId)return alert('Выберите чат!');
    const btn=document.getElementById('record-btn');
    if(!mediaRecorder||mediaRecorder.state==='inactive'){
        try{
            const stream=await navigator.mediaDevices.getUserMedia({audio:true});
            mediaRecorder=new MediaRecorder(stream);audioChunks=[];
            mediaRecorder.ondataavailable=e=>audioChunks.push(e.data);
            mediaRecorder.onstop=async()=>{
                const blob=new Blob(audioChunks,{type:'audio/webm'});
                const fd=new FormData();fd.append('file',new File([blob],'voice.webm'));
                try{
                    const res=await fetch('/api/upload',{method:'POST',headers:{'Authorization':'Bearer '+token},body:fd});
                    const d=await res.json();
                    sendWS({type:'private_message',receiverId:activeId,msgType:'audio',fileUrl:d.file_url});
                }catch(e){alert('Ошибка отправки голосового');}
                stream.getTracks().forEach(t=>t.stop());
            };
            mediaRecorder.start();btn.classList.add('recording');btn.innerText='⏹️';
        }catch(e){alert('Нет доступа к микрофону!');}
    }else{mediaRecorder.stop();btn.classList.remove('recording');btn.innerText='🎤';}
}

async function startCall(){
    if(!activeId)return;
    callTargetId=activeId;
    showCallScreen(activeName,'Исходящий звонок...',false);
    try{
        await initRTC(callTargetId);
        const offer=await peerConn.createOffer();
        await peerConn.setLocalDescription(offer);
        sendWS({type:'call_offer',receiverId:callTargetId,sdp:offer});
    }catch(e){alert('Нет доступа к микрофону!');endCall(false);}
}

async function handleOffer(d){
    const callerId=d.sender_id;
    let callerName='Входящий звонок';
    try{
        const res=await fetch('/api/user/'+callerId,{headers:{'Authorization':'Bearer '+token}});
        const user=await res.json();
        if(user&&user.username)callerName=user.username;
    }catch(e){}
    if(peerConn){sendWS({type:'call_hangup',receiverId:callerId});return;}
    callTargetId=callerId;
    pendingOffer=d;
    showCallScreen(callerName,'Входящий звонок...',true);
    try{
        await initRTC(callerId);
        await peerConn.setRemoteDescription(new RTCSessionDescription(d.sdp));
    }catch(e){endCall(false);}
}

async function acceptCall(){
    if(!peerConn)return;
    document.getElementById('answer-btn').style.display='none';
    document.getElementById('call-status').innerText='Разговор';
    try{
        const answer=await peerConn.createAnswer();
        await peerConn.setLocalDescription(answer);
        sendWS({type:'call_answer',receiverId:callTargetId,sdp:answer});
    }catch(e){endCall(false);}
}

async function initRTC(targetId){
    if(peerConn){peerConn.close();peerConn=null;}
    localStream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});
    peerConn=new RTCPeerConnection(rtcConfig);
    localStream.getTracks().forEach(t=>peerConn.addTrack(t,localStream));
    peerConn.onicecandidate=e=>{
        if(e.candidate)sendWS({type:'ice_candidate',receiverId:targetId,candidate:e.candidate});
    };
    peerConn.ontrack=e=>{
        const audio=document.getElementById('remote-audio');
        audio.srcObject=e.streams[0];
        audio.play().catch(()=>{});
    };
    peerConn.onconnectionstatechange=()=>{
        if(peerConn&&peerConn.connectionState==='connected'){
            document.getElementById('call-status').innerText='Разговор';
        }
        if(peerConn&&(peerConn.connectionState==='failed'||peerConn.connectionState==='disconnected')){
            endCall(false);
        }
    };
}

function showCallScreen(name,status,isIncoming){
    document.getElementById('call-screen').style.display='flex';
    document.getElementById('call-name').innerText=name||'Собеседник';
    document.getElementById('call-avatar-display').innerText=(name||'U')[0].toUpperCase();
    document.getElementById('call-status').innerText=status;
    document.getElementById('answer-btn').style.display=isIncoming?'flex':'none';
}

function endCall(notify=true){
    const idToNotify=callTargetId;
    if(notify&&idToNotify)sendWS({type:'call_hangup',receiverId:idToNotify});
    if(peerConn){peerConn.close();peerConn=null;}
    if(localStream){localStream.getTracks().forEach(t=>t.stop());localStream=null;}
    pendingOffer=null;callTargetId=null;
    document.getElementById('call-screen').style.display='none';
    document.getElementById('answer-btn').style.display='none';
    document.getElementById('call-status').innerText='Звонок...';
}

window.onload=()=>{
    const st=localStorage.getItem('m_token'),su=localStorage.getItem('m_user');
    if(st&&su){token=st;currentUser=JSON.parse(su);startApp();}
    document.addEventListener('visibilitychange',()=>{
        if(document.visibilityState==='visible'&&currentUser)connectWS();
    });
};
</script>
</body>
</html>
```
