<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Messenger Pro</title>
    <style>
        :root { --primary: #007AFF; --bg: #ffffff; --gray: #f2f2f7; --text: #000; --msg-me: #007AFF; --msg-op: #e9e9eb; }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); height: 100vh; overflow: hidden; }

        /* Авторизация */
        #auth-screen { position: fixed; inset: 0; background: white; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        input { width: 100%; max-width: 300px; padding: 12px; margin: 5px; border-radius: 10px; border: 1px solid #ddd; outline: none; }
        button { padding: 12px 24px; border-radius: 10px; border: none; background: var(--primary); color: white; cursor: pointer; font-weight: 600; }

        /* Главный контейнер */
        #main-app { display: none; height: 100vh; width: 100%; }

        /* Список чатов */
        #sidebar { width: 30%; border-right: 1px solid #ddd; display: flex; flex-direction: column; background: white; }
        #sidebar-header { padding: 15px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
        #chat-list { flex: 1; overflow-y: auto; }
        .chat-item { padding: 15px; border-bottom: 1px solid #f2f2f7; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .chat-item:active { background: #f2f2f7; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        /* Область чата */
        #chat-area { flex: 1; display: flex; flex-direction: column; background: white; }
        #chat-header { padding: 10px 15px; border-bottom: 1px solid #ddd; display: flex; align-items: center; gap: 10px; background: #fff; }
        #back-btn { display: none; font-size: 24px; cursor: pointer; padding-right: 10px; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #fff; }
        
        /* Сообщения */
        .msg { max-width: 75%; padding: 8px 12px; border-radius: 15px; font-size: 15px; line-height: 1.4; position: relative; }
        .msg.me { align-self: flex-end; background: var(--msg-me); color: white; }
        .msg.op { align-self: flex-start; background: var(--msg-op); color: black; }
        .msg img { max-width: 100%; border-radius: 10px; margin-top: 5px; }
        .msg audio { width: 200px; height: 35px; margin-top: 5px; }

        /* Ввод сообщения */
        #input-panel { padding: 10px; display: flex; align-items: center; gap: 10px; border-top: 1px solid #ddd; }
        #msg-input { flex: 1; background: #f2f2f7; border: none; padding: 10px 15px; border-radius: 20px; }
        .icon-btn { font-size: 20px; cursor: pointer; padding: 5px; }
        #record-btn.recording { color: red; animation: pulse 1s infinite; }

        /* Мобильная адаптация */
        @media (max-width: 768px) {
            #sidebar { width: 100%; }
            #chat-area { position: fixed; inset: 0; width: 100%; z-index: 10; display: none; }
            #chat-area.active { display: flex; }
            #back-btn { display: block; }
        }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        
        #toast { position: fixed; bottom: 20px; right: 20px; background: #333; color: white; padding: 10px 20px; border-radius: 10px; display: none; z-index: 2000; }
    </style>
</head>
<body>

    <div id="toast">Новое сообщение</div>

    <div id="auth-screen">
        <h2 id="auth-title">Messenger</h2>
        <input type="text" id="username" placeholder="Логин">
        <input type="password" id="password" placeholder="Пароль">
        <div style="margin-top: 10px;">
            <button onclick="auth('login')">Войти</button>
            <button style="background:none; color:var(--primary)" onclick="auth('register')">Создать аккаунт</button>
        </div>
    </div>

    <div id="main-app">
        <div id="sidebar">
            <div id="sidebar-header">
                <span id="my-name" style="font-weight:bold" onclick="logout()">Профиль</span>
                <span onclick="alert('Данные: ' + currentUser.username)">⚙️</span>
            </div>
            <div style="padding: 10px;"><input type="text" id="search" placeholder="Поиск по нику..." oninput="searchUsers()"></div>
            <div id="chat-list"></div>
        </div>

        <div id="chat-area">
            <div id="chat-header">
                <span id="back-btn" onclick="closeChat()">←</span>
                <div class="avatar" id="chat-avatar" style="width:35px; height:35px">?</div>
                <div style="flex:1"><b id="chat-user-name">Собеседник</b></div>
                <span class="icon-btn" onclick="alert('Звонки в разработке...')">📞</span>
            </div>
            <div id="messages"></div>
            <div id="input-panel">
                <label class="icon-btn">📷<input type="file" id="file-input" hidden onchange="sendFile()"></label>
                <input type="text" id="msg-input" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') sendText()">
                <span id="record-btn" class="icon-btn" onclick="toggleRecord()">🎤</span>
                <button onclick="sendText()">→</button>
            </div>
        </div>
    </div>

    <script>
        let currentUser = null, token = null, ws = null, activeId = null, mediaRecorder = null, audioChunks = [];

        async function auth(type) {
            const u = document.getElementById('username').value, p = document.getElementById('password').value;
            const res = await fetch('/api/' + type, { method: 'POST', body: JSON.stringify({username:u, password:p}) });
            const data = await res.json();
            if (data.token) { 
                token = data.token; currentUser = data.user; 
                localStorage.setItem('m_token', token); localStorage.setItem('m_user', JSON.stringify(currentUser));
                startApp(); 
            } else if (type === 'register' && data.success) alert('Ок, теперь войди');
            else alert('Ошибка');
        }

        function startApp() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
            document.getElementById('my-name').innerText = currentUser.username;
            connectWS(); loadChats();
        }

        function connectWS() {
            const prot = location.protocol === 'https:' ? 'wss://' : 'ws://';
            ws = new WebSocket(prot + location.host);
            ws.onopen = () => ws.send(JSON.stringify({type:'auth', token}));
            ws.onmessage = (e) => {
                const d = JSON.parse(e.data);
                if (d.type === 'private_message') {
                    if (activeId == d.sender_id || activeId == d.receiver_id) addMsg(d);
                    else if (d.sender_id != currentUser.id) showToast();
                    loadChats();
                }
            };
        }

        async function loadChats() {
            const res = await fetch('/api/chats', { headers: {'Authorization': 'Bearer ' + token} });
            const chats = await res.json();
            const list = document.getElementById('chat-list');
            list.innerHTML = '';
            chats.forEach(c => {
                const div = document.createElement('div'); div.className = 'chat-item';
                div.innerHTML = `<div class="avatar">${c.username[0].toUpperCase()}</div><div><b>${c.username}</b></div>`;
                div.onclick = () => openChat(c.id, c.username);
                list.appendChild(div);
            });
        }

        async function openChat(id, name) {
            activeId = id;
            document.getElementById('chat-user-name').innerText = name;
            document.getElementById('chat-avatar').innerText = name[0].toUpperCase();
            document.getElementById('chat-area').classList.add('active');
            const res = await fetch('/api/messages/' + id, { headers: {'Authorization': 'Bearer ' + token} });
            const msgs = await res.json();
            const container = document.getElementById('messages');
            container.innerHTML = '';
            msgs.forEach(addMsg);
            container.scrollTop = container.scrollHeight;
        }

        function closeChat() { document.getElementById('chat-area').classList.remove('active'); activeId = null; }

        function addMsg(m) {
            const container = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = 'msg ' + (m.sender_id == currentUser.id ? 'me' : 'op');
            if (m.msgType === 'image') div.innerHTML = `<img src="${m.file_url}">`;
            else if (m.msgType === 'audio') div.innerHTML = `<audio controls src="${m.file_url}"></audio>`;
            else div.innerText = m.text;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function sendText() {
            const i = document.getElementById('msg-input');
            if (!i.value || !activeId) return;
            ws.send(JSON.stringify({type:'private_message', receiverId: activeId, text: i.value}));
            i.value = '';
        }

        async function sendFile() {
            const file = document.getElementById('file-input').files[0];
            if (!file) return;
            const formData = new FormData(); formData.append('file', file);
            const res = await fetch('/api/upload', { method:'POST', headers:{'Authorization':'Bearer '+token}, body:formData });
            const data = await res.json();
            ws.send(JSON.stringify({type:'private_message', receiverId: activeId, msgType: 'image', fileUrl: data.file_url}));
        }

        async function toggleRecord() {
            const btn = document.getElementById('record-btn');
            if (!mediaRecorder || mediaRecorder.state === 'inactive') {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    const blob = new Blob(audioChunks, { type: 'audio/webm' });
                    const file = new File([blob], "voice.webm");
                    const formData = new FormData(); formData.append('file', file);
                    const res = await fetch('/api/upload', { method:'POST', headers:{'Authorization':'Bearer '+token}, body:formData });
                    const data = await res.json();
                    ws.send(JSON.stringify({type:'private_message', receiverId: activeId, msgType: 'audio', fileUrl: data.file_url}));
                    stream.getTracks().forEach(t => t.stop());
                };
                mediaRecorder.start();
                btn.classList.add('recording');
            } else {
                mediaRecorder.stop();
                btn.classList.remove('recording');
            }
        }

        async function searchUsers() {
            const q = document.getElementById('search').value;
            if (q.length < 2) return;
            const res = await fetch('/api/search?q=' + q, { headers: {'Authorization': 'Bearer ' + token} });
            const users = await res.json();
            const list = document.getElementById('chat-list');
            list.innerHTML = '';
            users.forEach(u => {
                const div = document.createElement('div'); div.className = 'chat-item';
                div.innerHTML = `<div class="avatar">${u.username[0].toUpperCase()}</div><div><b>${u.username}</b></div>`;
                div.onclick = () => openChat(u.id, u.username);
                list.appendChild(div);
            });
        }

        function showToast() {
            const t = document.getElementById('toast'); t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        function logout() { localStorage.clear(); location.reload(); }

        window.onload = () => {
            const st = localStorage.getItem('m_token'), su = localStorage.getItem('m_user');
            if (st) { token = st; currentUser = JSON.parse(su); startApp(); }
        };
    </script>
</body>
</html>
